---
# =============================================================================
# open-pull/tasks/preflight.yaml
#
# PURPOSE
#   Verifies the internet-side host can perform the pull end-to-end
#   before any registry login or image pull happens.
#
# INPUTS (vars)
#   artifact_staging_dir     str    Where the bundle will be written
#   image_tar_dir            str    Subdir for image .tar files
#   helm_chart_dir           str    Subdir for chart .tgz files
#   min_free_disk_gb         int    Required free space (preflight threshold)
#
# OUTPUTS (set_fact)
#   staging_mount            dict   Mount entry containing artifact_staging_dir
#   tool_checks              list   which-output for each required CLI
#
# SIDE EFFECTS
#   Creates artifact_staging_dir, image_tar_dir, helm_chart_dir
#   (mode 0755, current user). Nothing else is modified.
#
# IDEMPOTENCY
#   Safe to re-run; mkdir is conditional.
#
# FAILURE MODES
#   - ansible-core below 2.17            → the EE is built wrong or you are not
#                                            running inside it; rebuild with
#                                            ee/build-ee.sh and run via
#                                            ansible-navigator (see pull/README.md)
#   - Required collection missing        → the EE is missing a collection;
#                                            check ee/requirements.yml and
#                                            rebuild the EE (ee/build-ee.sh)
#   - Required CLI missing               → install before re-running
#                                            (setup.sh covers this)
#   - Insufficient disk space            → free space or lower threshold
#
# DESIGN NOTES
#   The disk check looks at the filesystem containing artifact_staging_dir,
#   not the root partition. If artifact_staging_dir is on a separate mount
#   (USB drive, secondary partition), the check measures THAT filesystem.
# =============================================================================

- name: Assert ansible-core meets the minimum supported version
  ansible.builtin.assert:
    that:
      - ansible_version.full is version('2.17.0', '>=')
    fail_msg: >-
      ansible-core {{ ansible_version.full }} is below the required 2.17.0.
      Inside the f5-airgap EE this should never happen — if it does, the EE
      was built incorrectly or you are running the playbook outside it.
      Rebuild with ee/build-ee.sh and run via ansible-navigator (see
      pull/README.md).
    success_msg: "ansible-core {{ ansible_version.full }} (>= 2.17.0) — OK"
  tags: [preflight]
  # FIRST gate, on purpose. ansible_version is a magic var (the controller's
  # own version), available without gather_facts, so this fails in one second
  # if the EE was built wrong — before any login, pull, or mkdir.
  # The 2.17.0 floor matches ee/execution-environment.yml; keep them in sync.

- name: Read installed Ansible collections
  ansible.builtin.command: ansible-galaxy collection list --format json
  args:
    # Run from the project root (where ansible.cfg lives) so ansible-galaxy
    # honors the project's collections_path (./collections:…) and sees the
    # SAME collections the playbook loads. Without this, the command module's
    # default working dir does not read the project ansible.cfg, so a
    # project-local install reports as "missing" — a false negative.
    chdir: "{{ playbook_dir }}/../.."
  register: preflight_collection_list
  changed_when: false
  check_mode: false
  tags: [preflight]

- name: Assert required collections are installed and current
  vars:
    # ansible-galaxy emits {path: {name: {version: x}}}; flatten across paths.
    _collections: "{{ preflight_collection_list.stdout | from_json }}"
    _docker_versions: >-
      {{ _collections.values() | map('dict2items') | flatten
         | selectattr('key', 'equalto', 'community.docker')
         | map(attribute='value.version') | list }}
    # Sentinel so an ABSENT collection yields a version that fails the floor
    # cleanly, instead of `| first` throwing on an empty list (which would
    # crash msg templating before our fail_msg could render).
    _docker_ver: "{{ (_docker_versions + ['0.0.0']) | first }}"
  ansible.builtin.assert:
    that:
      - _docker_versions | length > 0
      - _docker_ver is version('3.10.0', '>=')
    fail_msg: >-
      community.docker is missing or too old (need >=3.10.0; found
      {{ _docker_ver }}). Inside the EE this means ee/requirements.yml is wrong
      or the EE is stale — fix the pin and rebuild with ee/build-ee.sh.
    success_msg: "Collections OK — community.docker {{ _docker_ver }}"
  tags: [preflight]
  # SECOND gate. Catches the "good ansible, no collections" state that
  # otherwise fails deep in pull_dockerhub.yaml with the cryptic
  # "couldn't resolve module/action 'community.docker.docker_login'".
  # Helm repo management uses the helm CLI directly (not kubernetes.core),
  # so only community.docker is asserted here.

- name: Verify required CLI tools are installed
  ansible.builtin.shell: "command -v {{ item }}"
  loop:
    - docker         # docker save (image export)
    - helm           # helm pull (chart download)
    - tar            # bundle creation
    - sha256sum      # per-file checksum computation
  changed_when: false
  register: tool_checks
  failed_when: tool_checks.rc != 0
  tags: [preflight]
  # `command -v` (a POSIX shell builtin) rather than `which`: the UBI 9 base the
  # EE is built from doesn't ship the `which` binary (RHEL 9 deprecated it). All
  # four tools are baked into the EE; this just confirms they're on PATH.

- name: Identify filesystem mount for artifact staging directory
  ansible.builtin.set_fact:
    staging_mount: >-
      {{ ansible_facts['mounts']
         | selectattr('mount', 'in', artifact_staging_dir)
         | sort(attribute='mount') | last }}
  tags: [preflight]
  # Walks the mount table to find the longest mount prefix containing
  # artifact_staging_dir. If artifact_staging_dir is /mnt/usb/foo and
  # /mnt/usb is its own mount, the disk check uses /mnt/usb's
  # filesystem — not the root partition.

- name: Assert sufficient free disk space
  ansible.builtin.assert:
    that:
      - (staging_mount.size_available | int) >= (min_free_disk_gb | int * 1024 * 1024 * 1024)
    fail_msg: >-
      Insufficient disk space on {{ staging_mount.mount }}.
      Available : {{ (staging_mount.size_available | int / 1073741824) | round(1) }} GB
      Required  : {{ min_free_disk_gb }} GB
      Free up space or lower min_free_disk_gb in group_vars/all/main.yaml.
    success_msg: >-
      Disk check passed — {{ (staging_mount.size_available | int / 1073741824) | round(1) }} GB
      available on {{ staging_mount.mount }}.
  tags: [preflight]

- name: Ensure staging directories exist
  ansible.builtin.file:
    path:  "{{ item }}"
    state: directory
    mode:  "0755"
  loop:
    - "{{ artifact_staging_dir }}"
    - "{{ image_tar_dir }}"
    - "{{ helm_chart_dir }}"
  tags: [preflight]
