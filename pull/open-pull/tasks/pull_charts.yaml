---
# =============================================================================
# open-pull/tasks/pull_charts.yaml
#
# PURPOSE
#   Adds the Helm repositories listed in helm_repos and pulls every chart
#   in helm_charts as a .tgz file under helm_chart_dir.
#
# DERIVATION
#   filename = "{{ item.chart | basename }}-{{ item.version }}.tgz"
#   This matches what `helm pull` actually produces (it derives the
#   output filename from the chart's Chart.yaml).
# =============================================================================

- name: Add Helm repositories
  kubernetes.core.helm_repository:
    name:         "{{ item.name }}"
    repo_url:     "{{ item.url }}"
    force_update: true
  loop: "{{ helm_repos }}"
  loop_control:
    label: "{{ item.name }}"
  tags: [pull, pull_charts]
  # force_update: true is non-negotiable. Without it, stale URLs for an
  # existing repo name are kept silently and the pull tries against the
  # wrong server.

- name: Update Helm repository cache
  ansible.builtin.command:
    cmd: helm repo update
  changed_when: true
  tags: [pull, pull_charts]

- name: Pull Helm charts
  ansible.builtin.command:
    cmd: "helm pull {{ item.chart }} --version {{ item.version }} --destination {{ helm_chart_dir }}"
  loop: "{{ helm_charts }}"
  loop_control:
    label: "{{ item.chart | basename }}-{{ item.version }}.tgz"
  changed_when: true
  tags: [pull, pull_charts]

- name: Stat Helm chart archives
  ansible.builtin.stat:
    path: "{{ helm_chart_dir }}/{{ item.chart | basename }}-{{ item.version }}.tgz"
  register: chart_stats
  loop: "{{ helm_charts }}"
  loop_control:
    label: "{{ item.chart | basename }}-{{ item.version }}.tgz"
  tags: [pull, pull_charts]

- name: Assert all Helm chart archives are present
  ansible.builtin.assert:
    that:
      - chart_stats.results | selectattr('stat.exists', 'equalto', false) | list | length == 0
    fail_msg: "Missing Helm chart archives (check earlier task output for the failed item)"
  tags: [pull, pull_charts]
