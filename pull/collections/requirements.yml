---
# =============================================================================
# collections/requirements.yml
#
# Install with:
#   ansible-galaxy collection install -r collections/requirements.yml
#
# These versions are pinned to floor values known to work. Higher versions
# are accepted because Ansible Galaxy uses SemVer.
# =============================================================================

collections:
  - name:    community.docker
    version: ">=3.10.0"     # docker_image_pull, docker_image_export available

  - name:    kubernetes.core
    version: ">=2.4.0"      # helm_repository module

  - name:    ansible.utils
    version: ">=2.10.0"     # used by future ccn-* stages for network helpers
