# =============================================================================
# ansible.cfg
#
# Committed configuration so every operator gets the same behavior without
# passing flags. ansible-playbook auto-loads this file when run from the
# repo root.
# =============================================================================

[defaults]
# Pin inventory so every run targets the right hosts without --inventory.
inventory = inventory/hosts.yaml

# Pin collection search paths. Order matters — first match wins.
collections_path = ./collections:~/.ansible/collections:/usr/share/ansible/collections

# Silence noisy deprecation warnings (we still address them in code).
deprecation_warnings = False

# Cleaner output for humans.
stdout_callback = default
display_skipped_hosts = False
display_ok_hosts = True

# Disable host-key checking for localhost runs.
host_key_checking = False

# Faster fact gathering by default (smart = cache when possible).
gathering = smart

[inventory]
# Treat empty inventory entries as errors rather than warnings.
unparsed_is_failed = True
