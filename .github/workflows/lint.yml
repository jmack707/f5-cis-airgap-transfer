# =============================================================================
# .github/workflows/lint.yml
#
# Runs on every push to main and every pull request. Jobs:
#   1. yaml-lint          — generic YAML syntax + style (ee/ pull/ push/)
#   2. syntax-check       — ansible-playbook --syntax-check on every playbook,
#                            collections installed from ee/requirements.yml
#   3. ee-validate        — ansible-builder validates the EE definition
#   4. shellcheck         — static analysis of the shell scripts
#   5. rhel-syntax-check  — playbook parse on Rocky 9 / UBI 9 filesystems
#   6. release-dry-run    — verifies the release workflow would succeed
# =============================================================================

name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: every job here only reads the checked-out tree.
permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # YAML lint — fast, catches obvious syntax mistakes
  # ---------------------------------------------------------------------------
  yaml-lint:
    name: yaml-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint all YAML
        run: |
          # Use 'relaxed' profile — strict yamllint is too pedantic for
          # heavily-commented task files. We catch real syntax errors;
          # we don't bikeshed line length or trailing whitespace.
          yamllint -d relaxed ee/ pull/ push/

  # ---------------------------------------------------------------------------
  # Syntax check — Ansible's own parser validates every playbook. Collections
  # now come from the single source of truth, ee/requirements.yml.
  # ---------------------------------------------------------------------------
  syntax-check:
    name: syntax-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install ansible-core
        run: pip install 'ansible-core>=2.17'

      - name: Install collections (from the EE requirements)
        run: ansible-galaxy collection install -r ee/requirements.yml

      - name: Stub vault.yaml files (required for syntax check to resolve vars)
        run: |
          # ansible-playbook --syntax-check loads vars_files. Without a
          # vault.yaml present, it errors out. We stub one with the example
          # values — they're not secrets, just placeholders.
          cp pull/vault.yaml.example pull/vault.yaml
          cp push/vault.yaml.example push/vault.yaml

      - name: Syntax-check pull playbooks
        working-directory: pull
        run: |
          ansible-playbook open-pull/playbooks/pull_artifacts.yaml --syntax-check
          ansible-playbook open-pull/playbooks/pull_artifacts_remove.yaml --syntax-check

      - name: Syntax-check push playbooks
        working-directory: push
        run: |
          ansible-playbook ccn-push/playbooks/push_artifacts.yaml --syntax-check
          ansible-playbook ccn-push/playbooks/push_artifacts_remove.yaml --syntax-check

  # ---------------------------------------------------------------------------
  # EE definition validation — `ansible-builder create` parses the
  # execution-environment.yml, resolves the dependency files, and generates a
  # build context + Containerfile WITHOUT running a full container build (fast,
  # no runtime needed). Catches schema errors and missing dependency files.
  # ---------------------------------------------------------------------------
  ee-validate:
    name: ee-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install ansible-builder
        run: pip install ansible-builder

      - name: Validate the EE definition (create build context)
        run: |
          ansible-builder create \
            --file ee/execution-environment.yml \
            --context /tmp/ee-context \
            --verbosity 2
          # ansible-builder names the file Containerfile or Dockerfile depending
          # on the detected runtime — accept either.
          cf="$(ls /tmp/ee-context/Containerfile /tmp/ee-context/Dockerfile 2>/dev/null | head -1)"
          test -n "$cf" || { echo "No Containerfile/Dockerfile generated"; exit 1; }
          echo "Generated $cf:"; head -40 "$cf"

  # ---------------------------------------------------------------------------
  # ShellCheck — static analysis of the shell scripts. The EE builder and the
  # host-prep script branch on arguments and OS state, so a shell linter earns
  # its keep. shellcheck is preinstalled on GitHub ubuntu runners.
  # ---------------------------------------------------------------------------
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: ShellCheck the shell scripts
        run: |
          shellcheck --version
          # SC1091: host-prep.sh sources /etc/os-release-style runtime files
          # only on the host; the source-not-followed warning is irrelevant at
          # lint time.
          shellcheck -e SC1091 ee/build-ee.sh push/host-prep.sh

  # ---------------------------------------------------------------------------
  # RHEL-family parse check — proves the playbooks parse on a Rocky/RHEL
  # filesystem. The GitHub runner OS is irrelevant; the job body runs INSIDE
  # the container, so ansible sees a RHEL-family root.
  #
  # NOTE: ansible-core is installed via pip into a python3.12 venv here on
  # purpose — EL9 base images ship Python 3.9, below ansible-core's 3.10 floor,
  # exactly as on a real EL9 host. The EE build itself (which also handles this)
  # is validated by the ee-validate job and by a real build via ee/build-ee.sh.
  # ---------------------------------------------------------------------------
  rhel-syntax-check:
    name: rhel-syntax-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - rockylinux/rockylinux:9
          - redhat/ubi9
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Python 3.12 and build an ansible venv
        run: |
          dnf install -y python3.12 python3.12-pip tar gzip git >/dev/null
          python3.12 -m venv /opt/ansible-venv
          /opt/ansible-venv/bin/pip install --upgrade pip >/dev/null
          /opt/ansible-venv/bin/pip install 'ansible-core>=2.17'
          /opt/ansible-venv/bin/ansible --version | head -1

      - name: Install collections (from the EE requirements)
        run: |
          export PATH="/opt/ansible-venv/bin:$PATH"
          ansible-galaxy collection install -r ee/requirements.yml

      - name: Static-check shell scripts on this platform
        run: |
          bash -n ee/build-ee.sh
          bash -n push/host-prep.sh

      - name: Stub vault.yaml files (syntax check loads vars_files)
        run: |
          cp pull/vault.yaml.example pull/vault.yaml
          cp push/vault.yaml.example push/vault.yaml

      - name: Syntax-check pull playbooks
        working-directory: pull
        run: |
          export PATH="/opt/ansible-venv/bin:$PATH"
          ansible-playbook open-pull/playbooks/pull_artifacts.yaml --syntax-check
          ansible-playbook open-pull/playbooks/pull_artifacts_remove.yaml --syntax-check

      - name: Syntax-check push playbooks
        working-directory: push
        run: |
          export PATH="/opt/ansible-venv/bin:$PATH"
          ansible-playbook ccn-push/playbooks/push_artifacts.yaml --syntax-check
          ansible-playbook ccn-push/playbooks/push_artifacts_remove.yaml --syntax-check

  # ---------------------------------------------------------------------------
  # Release dry-run — verifies the release workflow's zip-build step succeeds.
  # Each side's zip bundles a copy of ee/ so an operator who downloads one zip
  # can build the EE from it.
  # ---------------------------------------------------------------------------
  release-dry-run:
    name: release-dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build pull zip (dry run)
        run: |
          rm -rf /tmp/staging dist
          mkdir -p /tmp/staging/f5-airgap-pull dist
          cp -r pull/. /tmp/staging/f5-airgap-pull/
          cp -r ee /tmp/staging/f5-airgap-pull/ee
          rm -f /tmp/staging/f5-airgap-pull/vault.yaml
          (cd /tmp/staging && zip -rq "$GITHUB_WORKSPACE/dist/f5-airgap-pull-dryrun.zip" f5-airgap-pull)
          ls -lh dist/

      - name: Build push zip (dry run)
        run: |
          rm -rf /tmp/staging
          mkdir -p /tmp/staging/f5-airgap-push
          cp -r push/. /tmp/staging/f5-airgap-push/
          cp -r ee /tmp/staging/f5-airgap-push/ee
          rm -f /tmp/staging/f5-airgap-push/vault.yaml
          (cd /tmp/staging && zip -rq "$GITHUB_WORKSPACE/dist/f5-airgap-push-dryrun.zip" f5-airgap-push)
          ls -lh dist/

      - name: Confirm zips are non-empty and contain no vault.yaml
        run: |
          for z in dist/*.zip; do
            test "$(stat -c%s "$z")" -gt 1000 || { echo "$z is suspiciously small"; exit 1; }
            unzip -l "$z" | grep -E 'vault\.yaml$' && { echo "$z contains vault.yaml — abort"; exit 1; }
          done
          echo "Both zips look good."
