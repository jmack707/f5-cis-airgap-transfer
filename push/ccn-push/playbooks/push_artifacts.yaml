---
# =============================================================================
# ccn-push/playbooks/push_artifacts.yaml
#
# PURPOSE
#   Entry point for stage 2 of the air-gap pipeline. Reads the bundle
#   produced by the pull stage, verifies it, and publishes all images
#   and OCI charts into the closed-network registry.
#
# HOST PREP FIRST (outside the EE)
#   The HOST Docker-daemon changes — insecure-registries + restart (HTTP), or
#   private-CA trust under /etc/docker/certs.d (HTTPS) — cannot run cleanly
#   inside the EE container, so they now live in push/host-prep.sh. Run that
#   ONCE on the host with sudo before this playbook. See push/README.md.
#
# SEQUENCE (each step is a task file under ccn-push/tasks/, run inside the EE)
#   1. preflight                       Read-only checks (no mutations)
#   2. extract_bundle                  tar -xzf into ccn_staging_dir
#   3. verify_manifest                 SHA-256 of every file vs manifest
#   4. build_push_plan                 Joins manifest with push_repo maps
#   5. block: login → push images → push charts
#      always: logout                  Logout fires even if block fails
#
# RUN (through the EE)
#   ansible-navigator run ccn-push/playbooks/push_artifacts.yaml \
#     --vault-password-file .vault-pass
#
# RUN A SUBSET (using tags)
#   --tags preflight              Just validate the environment
#   --tags extract,verify         Bundle integrity check only
#   --tags push                   Skip preflight, skip extract, go straight
#                                  to login + push + logout (assumes the
#                                  staging area is already populated)
#
# DRY RUN
#   --check                       Read-only walkthrough (skips command
#                                  modules that don't support check mode)
#
# DESIGN NOTES
#   The login → push → logout block uses Ansible's block/always pattern
#   so logout fires even when an earlier push fails. Without this, a
#   robot token could linger in ~/.docker/config.json after a failed
#   run — a meaningful credential-hygiene issue in a shared host.
#
#   gather_facts: true is kept for parity and any fact-dependent reporting;
#   the disk-space check uses `df` (not the mounts fact), so it behaves the
#   same inside the EE as on bare metal.
#
#   vars_files order matters:
#     1. group_vars/all/main.yaml — operational defaults
#     2. vault.yaml               — credentials and endpoint topology
#   Both are required because group_vars references vault variables
#   via Jinja indirection.
# =============================================================================

- name: Push air-gap bundle to closed-network registry
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../../group_vars/all/main.yaml
    - ../../vault.yaml

  tasks:
    - name: Preflight checks
      ansible.builtin.include_tasks: ../tasks/preflight.yaml
      tags: [preflight]

    # NOTE: HOST Docker-daemon config (insecure-registries / private-CA trust)
    # is handled by push/host-prep.sh on the host BEFORE this run — it can't
    # run from inside the EE container. See the playbook header.

    - name: Extract bundle
      ansible.builtin.include_tasks: ../tasks/extract_bundle.yaml
      tags: [extract]

    - name: Verify file checksums against manifest
      ansible.builtin.include_tasks: ../tasks/verify_manifest.yaml
      tags: [verify]

    - name: Build push plan
      ansible.builtin.include_tasks: ../tasks/build_push_plan.yaml
      tags: [plan]

    # ----- Login → push → logout block --------------------------------------
    # Logout in `always:` fires even when an earlier task in the block
    # fails, preventing stale credentials on disk after a partial run.
    - name: Authenticate, push, and cleanly log out
      tags: [push]
      block:
        - name: Authenticate to closed-network registry
          ansible.builtin.include_tasks: ../tasks/login.yaml

        - name: Load and push container images
          ansible.builtin.include_tasks: ../tasks/load_and_push_images.yaml

        - name: Push Helm charts as OCI artifacts
          ansible.builtin.include_tasks: ../tasks/push_charts.yaml
      always:
        - name: Logout from registry
          ansible.builtin.include_tasks: ../tasks/logout.yaml

    - name: Done
      ansible.builtin.debug:
        msg:
          - "ccn-push complete."
          - "Registry : {{ ccn_registry_endpoint }}"
          - "Images   : {{ push_plan | length }}"
          - "Charts   : {{ chart_push_plan | length }}"
