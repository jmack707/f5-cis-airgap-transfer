---
# =============================================================================
# ccn-push/playbooks/push_artifacts_remove.yaml
#
# PURPOSE
#   Teardown counterpart to push_artifacts.yaml. Removes the local
#   staging area. Runs inside the EE via ansible-navigator. Does NOT delete
#   images from the registry itself — use the registry's own admin tooling.
#
# RUN (interactive — prompts before deleting)
#   ansible-navigator run ccn-push/playbooks/push_artifacts_remove.yaml \
#     --vault-password-file .vault-pass
#
# RUN (CI / non-interactive)
#   ansible-navigator run ccn-push/playbooks/push_artifacts_remove.yaml \
#     --vault-password-file .vault-pass --extra-vars "confirm_removal=true"
#
# UNDOING HOST DOCKER-DAEMON CHANGES (outside the EE)
#   The insecure-registries entry and the trusted private CA are HOST-level
#   changes made by host-prep.sh, so they are undone there, not here:
#     - HTTP insecure entry:
#         sudo ./host-prep.sh --host <h> --port <p> --insecure --remove
#     - HTTPS private CA (one-liner):
#         sudo rm -rf /etc/docker/certs.d/<host>[:<port>]
#
# DESIGN NOTES
#   confirm_removal default is false → an interactive operator running
#   without the flag must hit ENTER explicitly. The flag bypasses the
#   prompt for CI/automation contexts where no TTY is available.
#
#   vault.yaml IS required here because group_vars values reference
#   vault variables via Jinja indirection. The teardown doesn't actually
#   use any credentials, but Ansible still needs to resolve the values.
# =============================================================================

- name: Remove ccn-push staging area
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../group_vars/all/main.yaml
    - ../../vault.yaml

  vars:
    confirm_removal: false

  tasks:
    - name: Confirm removal (interactive)
      ansible.builtin.pause:
        prompt: >-
          About to delete {{ ccn_staging_dir }}. Press ENTER to continue, Ctrl-C then A to abort.
      when: not (confirm_removal | bool)

    - name: Remove staging directory
      ansible.builtin.file:
        path:  "{{ ccn_staging_dir }}"
        state: absent

    - name: Removal complete
      ansible.builtin.debug:
        msg:
          - "Removed: {{ ccn_staging_dir }}"
          - "Host Docker-daemon changes (insecure entry / trusted CA) are undone"
          - "with host-prep.sh --remove or by removing /etc/docker/certs.d/<host>."
