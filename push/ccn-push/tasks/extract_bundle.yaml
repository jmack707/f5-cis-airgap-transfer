---
# =============================================================================
# ccn-push/tasks/extract_bundle.yaml
#
# PURPOSE
#   Extracts the air-gap bundle into a staging directory and loads its
#   manifest.json into an Ansible fact so subsequent tasks can iterate
#   over the contents.
#
# INPUTS (vars)
#   ccn_bundle_incoming_path   str   Path to airgap-bundle.tar.gz
#   ccn_staging_dir            str   Working directory for extraction
#
# OUTPUTS (set_fact)
#   bundle_manifest            dict  Parsed contents of manifest.json
#
# SIDE EFFECTS
#   - Extracts <staging>/manifest.json
#   - Extracts <staging>/images/*.tar
#   - Extracts <staging>/charts/*.tgz
#
# IDEMPOTENCY
#   The `creates:` parameter on unarchive skips extraction if the marker
#   file (manifest.json) already exists. To force re-extraction, the
#   operator must clear the staging directory manually.
#
# FAILURE MODES
#   - Corrupted bundle archive               → unarchive emits the gzip/tar
#                                                error verbatim; the upstream
#                                                bundle generation needs fixing
#   - manifest.json missing from bundle      → next task fails with a clear
#                                                "manifest not found" error
#   - manifest.json is not valid JSON        → from_json filter raises
#
# DESIGN NOTES
#   We use the unarchive module rather than `tar -xzf` via command for
#   two reasons: it gives us proper Ansible facts (changed: true/false)
#   and it handles compression detection automatically. The cost is
#   that unarchive can't stream-extract — it reads the whole archive
#   into temp space first.
#
#   The manifest is loaded as a fact (not just stat'd) so downstream
#   tasks like verify_manifest.yaml and build_push_plan.yaml can iterate
#   over its image and chart lists directly.
# =============================================================================

- name: Extract bundle into staging directory
  ansible.builtin.unarchive:
    src:        "{{ ccn_bundle_incoming_path }}"
    dest:       "{{ ccn_staging_dir }}"
    remote_src: true
    creates:    "{{ ccn_staging_dir }}/manifest.json"
  tags: [extract]
  # remote_src: true — the bundle is already on this host.
  # creates: makes the task idempotent. If staging already has the
  # manifest, we don't re-extract; that's the operator's signal to
  # clean up before re-running.

- name: Confirm extracted manifest is present
  ansible.builtin.stat:
    path: "{{ ccn_staging_dir }}/manifest.json"
  register: extracted_manifest
  failed_when: not extracted_manifest.stat.exists
  tags: [extract]
  # Belt-and-suspenders check. If the bundle was generated by a future
  # version of the pull stage that no longer includes manifest.json,
  # we want to fail here with a clear message rather than later when
  # set_fact tries to parse a non-existent file.

- name: Load manifest into a fact
  ansible.builtin.set_fact:
    bundle_manifest: "{{ lookup('file', ccn_staging_dir + '/manifest.json') | from_json }}"
  tags: [extract]

- name: Report manifest summary
  ansible.builtin.debug:
    msg:
      - "Bundle generated at : {{ bundle_manifest.generated_at }}"
      - "Images in bundle    : {{ bundle_manifest.images | length }}"
      - "Charts in bundle    : {{ bundle_manifest.charts | length }}"
  tags: [extract]
