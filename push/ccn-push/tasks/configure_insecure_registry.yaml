---
# =============================================================================
# ccn-push/tasks/configure_insecure_registry.yaml
#
# PURPOSE
#   Configures the Docker daemon to allow HTTP push to a registry that
#   doesn't use TLS. Docker refuses HTTP registries by default — every
#   pull/push tries HTTPS first and fails with
#   "http: server gave HTTP response to HTTPS client". The fix is to list
#   the registry endpoint under `insecure-registries` in
#   /etc/docker/daemon.json, then restart dockerd to pick up the change.
#
# INPUTS (vars)
#   ccn_registry_insecure   bool    Skip all work when false (HTTPS profile)
#   ccn_registry_endpoint   str     "<host>:<port>" form, used as the
#                                    insecure-registries list entry
#
# OUTPUTS (set_fact)
#   existing_daemon_config  dict    Parsed daemon.json (or {} if missing)
#   merged_daemon_config    dict    Same with our endpoint added/preserved
#
# SIDE EFFECTS
#   - Creates /etc/docker if missing (root, 0755)
#   - Writes /etc/docker/daemon.json (with backup of any previous version)
#   - Restarts dockerd ONLY when daemon.json actually changes
#   - Waits for dockerd to come back up before continuing
#
# IDEMPOTENCY
#   - First run: writes daemon.json, restarts dockerd
#   - Subsequent runs: detects no change, leaves dockerd alone
#   - "Already in the list" is the same as "we just added it"
#
# FAILURE MODES
#   - Existing daemon.json is invalid JSON → operator must hand-repair
#   - dockerd fails to restart                → check `journalctl -u docker`
#   - daemon.json silently ignored            → ensure /etc/docker is the
#                                               correct config path for the
#                                               Docker installation (usually
#                                               /etc/docker, sometimes overridden)
#
# DESIGN NOTES
#   We MERGE with any existing daemon.json rather than overwriting it. If
#   the operator has set other dockerd options (e.g. log-driver,
#   storage-driver, default-runtime), we must preserve them. The merge
#   uses Ansible's `combine` filter with `unique` on the list so adding
#   the same endpoint twice doesn't duplicate.
#
#   Restart is gated on `daemon_json_written is changed`, not on whether
#   the playbook is being run, so re-runs after a successful first run
#   don't bounce containers.
#
#   `diff: true` on the copy task surfaces exactly what changed in
#   daemon.json when running with --diff, so the operator can review
#   the change before the restart fires.
# =============================================================================

- name: Skip insecure-registry configuration — registry uses HTTPS
  ansible.builtin.debug:
    msg: "ccn_registry_insecure is false; Docker will use HTTPS for {{ ccn_registry_endpoint }}."
  when: not (ccn_registry_insecure | bool)
  tags: [configure_insecure_registry]

- name: Configure insecure registry (HTTP)
  when: ccn_registry_insecure | bool
  become: true
  tags: [configure_insecure_registry]
  block:
    - name: Ensure /etc/docker directory exists
      ansible.builtin.file:
        path:  /etc/docker
        state: directory
        owner: root
        group: root
        mode:  "0755"

    - name: Check if /etc/docker/daemon.json exists
      ansible.builtin.stat:
        path: /etc/docker/daemon.json
      register: daemon_json_stat

    - name: Load existing daemon.json (if present)
      ansible.builtin.slurp:
        src: /etc/docker/daemon.json
      register: daemon_json_raw
      when: daemon_json_stat.stat.exists
      # slurp returns b64-encoded content; we decode + parse next.

    - name: Parse existing daemon.json into a dict
      ansible.builtin.set_fact:
        existing_daemon_config: >-
          {{ (daemon_json_raw.content | b64decode | from_json)
             if daemon_json_stat.stat.exists else {} }}

    - name: Build merged daemon.json with insecure registry entry
      ansible.builtin.set_fact:
        merged_daemon_config: >-
          {{ existing_daemon_config | combine({
               'insecure-registries':
                 ((existing_daemon_config['insecure-registries'] | default([]))
                  + [ccn_registry_endpoint]) | unique
             }) }}
      # `combine` does a shallow merge; we replace the
      # insecure-registries key with the union of the previous list and
      # our endpoint. `unique` deduplicates so re-runs are idempotent.

    - name: Write merged /etc/docker/daemon.json
      ansible.builtin.copy:
        content: "{{ merged_daemon_config | to_nice_json }}\n"
        dest:    /etc/docker/daemon.json
        owner:   root
        group:   root
        mode:    "0644"
        backup:  true
      diff: true
      register: daemon_json_written
      # backup: true keeps /etc/docker/daemon.json.<timestamp> on disk
      # whenever we change the file, so a bad merge can be reverted by
      # the operator without losing the prior config.

    - name: Restart Docker daemon to pick up insecure-registries change
      ansible.builtin.service:
        name:  docker
        state: restarted
      when: daemon_json_written is changed
      # Gating on `changed` is critical for idempotency — running the
      # playbook against an already-configured host should NOT bounce
      # dockerd and disrupt running containers.

    - name: Wait for Docker daemon to come back up
      ansible.builtin.command:
        cmd: docker info
      register: docker_info_check
      retries: 10
      delay:   2
      until:   docker_info_check.rc == 0
      changed_when: false
      when: daemon_json_written is changed

    - name: Confirm registry is in insecure-registries list
      ansible.builtin.command:
        cmd: docker info --format '{{ "{{" }}.RegistryConfig.InsecureRegistryCIDRs{{ "}}" }} {{ "{{" }}.RegistryConfig.IndexConfigs{{ "}}" }}'
      register: docker_insecure_check
      changed_when: false
      failed_when: ccn_registry_endpoint not in docker_insecure_check.stdout
      # Double-check via the daemon's reported config, not just by
      # reading daemon.json. If dockerd ignored the file for any reason
      # (wrong location, parse error not caught), we catch it here
      # before any push attempts produce confusing TLS errors.
